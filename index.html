<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMCS - CodeSpecialists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --matrix-green: #00ff41;
            --dark-bg: #0a0a0a;
            --card-bg: #111111;
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        .mono { font-family: 'Courier New', Courier, monospace; }

        .glow-text {
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        /* Navigation Styling */
        .nav-btn {
            color: #666;
            font-family: 'Courier New', Courier, monospace;
            transition: all 0.2s ease;
            padding: 0.5rem 1rem;
            border-bottom: 2px solid transparent;
        }

        .nav-btn:hover {
            color: var(--matrix-green);
        }

        .nav-btn.active {
            color: var(--matrix-green);
            border-bottom: 2px solid var(--matrix-green);
            background: rgba(0, 255, 65, 0.05);
        }

        /* Page Handling */
        .page-view {
            display: none;
            height: calc(100vh - 80px);
            overflow-y: auto;
            padding: 2rem;
        }

        .page-view.active {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .matrix-card {
            background: var(--card-bg);
            border: 1px solid #222;
            transition: all 0.3s ease;
        }

        .matrix-card:hover {
            border-color: var(--matrix-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
        }

        .btn-action {
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            padding: 10px 24px;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-action:hover {
            background: var(--matrix-green);
            color: black;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb:hover { background: var(--matrix-green); }

        .coming-soon-badge {
            background: rgba(0, 255, 65, 0.1);
            color: var(--matrix-green);
            font-size: 0.65rem;
            padding: 2px 8px;
            border: 1px solid var(--matrix-green);
            border-radius: 4px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="h-20 bg-black border-b border-white/5 flex-shrink-0">
        <div class="max-w-7xl mx-auto px-8 h-full flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showPage('home')">
                <div class="w-8 h-8 bg-green-500 rounded flex items-center justify-center text-black font-bold">CS</div>
                <h1 class="text-xl font-bold tracking-tighter text-white uppercase">EMCS <span class="text-green-500">CodeSpecialists</span></h1>
            </div>
            <div class="flex gap-4">
                <button onclick="showPage('home')" id="nav-home" class="nav-btn active">HOME</button>
                <button onclick="showPage('team')" id="nav-team" class="nav-btn">TEAM</button>
                <button onclick="showPage('creations')" id="nav-creations" class="nav-btn">CREATIONS</button>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-grow relative bg-[#050505]">
        
        <!-- HOME PAGE -->
        <div id="page-home" class="page-view active">
            <div class="h-full flex flex-col items-center justify-center text-center">
                <div class="mono text-green-500 text-sm mb-4 tracking-widest bg-green-500/10 px-4 py-1 rounded">SYSTEM: ONLINE</div>
                <h2 class="text-6xl md:text-8xl font-black text-white mb-6 tracking-tight">
                    CODE<br><span class="text-green-500">SPECIALISTS</span>
                </h2>
                <p class="max-w-xl text-gray-500 mono mb-10 text-lg">
                    High-performance software development, debugging, and visual engineering.
                </p>
                <div class="flex gap-4">
                    <button onclick="showPage('team')" class="btn-action">Operatives</button>
                    <button onclick="showPage('creations')" class="btn-action">Repository</button>
                </div>
            </div>
        </div>

        <!-- TEAM PAGE -->
        <div id="page-team" class="page-view">
            <div class="max-w-6xl mx-auto">
                <header class="mb-12">
                    <h3 class="text-4xl font-black text-white mb-2 uppercase">Operatives</h3>
                    <p class="text-green-500 mono text-sm">// Encrypted personnel files</p>
                </header>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="member-grid">
                    <!-- Members Injected by JS -->
                </div>
            </div>
        </div>

        <!-- CREATIONS PAGE -->
        <div id="page-creations" class="page-view">
            <div class="max-w-4xl mx-auto">
                <header class="mb-12">
                    <h3 class="text-4xl font-black text-white mb-2 uppercase">Repository</h3>
                    <p class="text-green-500 mono text-sm">// Development builds and secure deployments</p>
                </header>
                <div id="links-container" class="grid gap-4">
                    <!-- Links Injected by JS -->
                </div>
            </div>
        </div>

    </main>

    <!-- Bio Modal -->
    <div id="bioModal" class="modal" onclick="if(event.target == this) closeModal()">
        <div class="bg-[#111] border border-green-500/50 p-10 rounded-xl max-w-md w-full relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500 hover:text-green-500 transition-colors">
                <i class="fas fa-times text-2xl"></i>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // CONFIGURATION: Creations with placeholders
        const creationsList = [
            { 
                title: "Core System v1.0", 
                desc: "The fundamental architecture for CodeSpecialists operations.",
                status: "COMING SOON"
            },
            { 
                title: "Visual Engine", 
                desc: "Advanced graphical interface components for the web.",
                status: "COMING SOON"
            },
            { 
                title: "Debug Console", 
                desc: "Proprietary tool for deep-level script analysis.",
                status: "COMING SOON"
            },
            { 
                title: "Documentation Engine", 
                desc: "High-speed text processing and asset management.",
                status: "COMING SOON"
            }
        ];

        // TEAM DATA
        const members = [
            { name: "Shane Choi", role: "Main Programmer", icon: "fa-code", color: "text-green-400" },
            { name: "Emerson Cox", role: "Main Debugger", icon: "fa-shield-virus", color: "text-red-400" },
            { name: "Martin Streckfus-Green", role: "Visuals and Graphics", icon: "fa-wand-magic-sparkles", color: "text-blue-400" },
            { name: "Clayton Kim", role: "Text Editor", icon: "fa-pen-nib", color: "text-orange-400" }
        ];

        function showPage(pageId) {
            document.querySelectorAll('.page-view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

            const targetPage = document.getElementById('page-' + pageId);
            const targetNav = document.getElementById('nav-' + pageId);
            
            if(targetPage) targetPage.classList.add('active');
            if(targetNav) targetNav.classList.add('active');
        }

        function renderMembers() {
            const grid = document.getElementById('member-grid');
            grid.innerHTML = members.map((m, index) => `
                <div class="matrix-card p-8 rounded-lg cursor-pointer group" onclick="showBio(${index})">
                    <div class="w-12 h-12 rounded bg-white/5 flex items-center justify-center mb-6 group-hover:bg-green-500/20 transition-colors">
                        <i class="fas ${m.icon} text-xl ${m.color}"></i>
                    </div>
                    <h4 class="text-xl font-bold text-white mb-1">${m.name}</h4>
                    <p class="text-gray-500 text-xs mono uppercase tracking-widest">${m.role}</p>
                    <div class="mt-8 pt-4 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[10px] mono text-gray-600 uppercase">Profile_Ready</span>
                        <i class="fas fa-arrow-right text-[10px] text-green-500 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                    </div>
                </div>
            `).join('');
        }

        function renderCreations() {
            const container = document.getElementById('links-container');
            container.innerHTML = creationsList.map(item => `
                <div class="matrix-card p-6 rounded-lg opacity-80 cursor-default">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h5 class="text-white font-bold text-lg">${item.title}</h5>
                                <span class="coming-soon-badge mono">${item.status}</span>
                            </div>
                            <p class="text-gray-500 text-sm mono">${item.desc}</p>
                        </div>
                        <i class="fas fa-lock text-gray-800 text-sm"></i>
                    </div>
                </div>
            `).join('');
        }

        function showBio(index) {
            const m = members[index];
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-16 h-16 rounded bg-green-500/10 flex items-center justify-center">
                        <i class="fas ${m.icon} text-3xl ${m.color}"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-white uppercase">${m.name}</h2>
                        <p class="text-green-500 text-xs mono uppercase tracking-tighter">${m.role}</p>
                    </div>
                </div>
                <div class="bg-black/50 p-6 rounded-lg border border-white/5 mb-6">
                    <p class="text-gray-400 mono text-sm leading-relaxed">
                        FILL OUT LATER WITH YOUR BIOGRAPHY. This encrypted profile contains the professional history and technical expertise of ${m.name}.
                    </p>
                </div>
                <div class="flex justify-between items-center text-[10px] mono text-gray-600">
                    <span>STATUS: ACTIVE</span>
                    <span>AUTHORITY: HIGH</span>
                </div>
            `;
            document.getElementById('bioModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('bioModal').style.display = 'none';
        }

        window.onload = () => {
            renderMembers();
            renderCreations();
        };
    </script>
</body>
</html>
